name: SmartNetEnergy MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: smartnetenergycr.azurecr.io
  IMAGE_NAME: smartnetenergy-api

jobs:
  # Job 1 : Tests automatiques
  test:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest api/tests/ -v

  # Job 2 : Build Docker
  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: smartnetenergycr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build ./api -t smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}
          docker build ./api -t smartnetenergycr.azurecr.io/smartnetenergy-api:latest
          docker push smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}
          docker push smartnetenergycr.azurecr.io/smartnetenergy-api:latest

  # Job 3 : Déploiement
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: smartnetenergycr
          containerAppName: smartnetenergy-api
          resourceGroup: rg-smartnetenergy
          imageToDeploy: smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}

  # Job 4 : Notification
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send email notification
        run: |
          echo "Pipeline completed with status: ${{ job.status }}"
