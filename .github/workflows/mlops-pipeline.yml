name: SmartNetEnergy MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: smartnetenergycr.azurecr.io
  IMAGE_NAME: smartnetenergy-api

jobs:
  test:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic numpy scikit-learn joblib httpx pytest

      - name: Run tests
        working-directory: ./api
        run: pytest tests/ -v

  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: smartnetenergycr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build ./api -t smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}
          docker build ./api -t smartnetenergycr.azurecr.io/smartnetenergy-api:latest
          docker push smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}
          docker push smartnetenergycr.azurecr.io/smartnetenergy-api:latest

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: smartnetenergycr
          containerAppName: smartnetenergy-api
          resourceGroup: rg-smartnetenergy
          imageToDeploy: smartnetenergycr.azurecr.io/smartnetenergy-api:${{ github.sha }}

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Pipeline status
        run: echo "Pipeline completed with status ${{ job.status }}"
